name: bloomfame
description: "A new Flutter project."

publish_to: 'none'

version: 1.2.0+20

environment:
  sdk: '>=3.2.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.4
  path_provider: ^2.0.11
  devicelocale: ^0.5.2
  intl: ^0.18.0
  firebase_auth: ^5.1.4
  firebase_messaging: ^15.0.4
  flutter_local_notifications: ^16.3.1
  firebase_database: ^11.0.4
  firebase_core: ^3.3.0
  firebase_storage: ^12.1.3
  firebase_app_check: ^0.3.0+4
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  url_launcher: ^6.1.6
  camera: ^0.10.5+6
  video_player: ^2.8.2
  scrolling_text: ^0.0.4
  decorated_icon: ^1.2.1
  photo_view: ^0.15.0
  flutter_svprogresshud: ^1.0.0
  vibration: ^1.7.4-nullsafety.0
  syncfusion_flutter_charts: ^24.1.41
  http: ^1.2.0
  image_picker: ^1.0.5
  mailer: ^6.1.0
  provider: ^6.0.3
  flutter_native_splash: ^2.2.17
  connectivity_plus: ^2.3.6+1
  wakelock: ^0.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter_native_splash:
  color: "#000026"
  image: assets/graphics/splash.png
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/graphics/
    - assets/flags/
    - assets/raw/